[phases.setup]
nixPkgs = ["python312", "python312Packages.setuptools", "cairo", "pkg-config"]
aptPkgs = [
  "libcairo2-dev",
  "libgl1-mesa-glx",
  "libglib2.0-0",
  "libjpeg-dev",
  "zlib1g-dev",
  "libmupdf-dev",
  "libfreetype6-dev",
]

[phases.install]
cmds = [
  "pip install setuptools>=70.0.0",
  "pip install -r requirements.txt",
  "playwright install chromium --with-deps",
]

[phases.build]
cmds = ["echo 'No build needed'"]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"
